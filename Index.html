<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Rutina</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .app {
      max-width: 430px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 5px;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 14px;
    }

    .time {
      font-weight: bold;
      color: #38bdf8;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>Mi Rutina</h1>
    <p>Calendario diario para mantener disciplina.</p>

    <div class="card">
      <div class="time">6:00 AM</div>
      <div>Wake up</div>
    </div>

    <div class="card">
      <div class="time">6:30 AM</div>
      <div>Orar y meditar en Dios</div>
    </div>

    <div class="card">
      <div class="time">7:00 AM</div>
      <div>Gym</div>
    </div>

    <div class="card">
      <div class="time">8:30 AM</div>
      <div>Limpiar la casa</div>
    </div>

    <button>Reiniciar mañana</button>
  </div>

</body>
</html>
